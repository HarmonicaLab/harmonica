<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harmonica Lab Tab Transcriber</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f4f5f7;--surface:#fff;--surface2:#eef0f4;--border:#d0d5e0;--accent:#e8c84a;--accent2:#4ae8b4;--danger:#e84a4a;--text:#1a1d26;--muted:#7a828f;--in-tune:#1aaa80;--purple:#8855dd}
body.dark{--bg:#0d0f14;--surface:#161922;--surface2:#1e2230;--border:#2a3040;--text:#e8eaf0;--muted:#6b7280;--in-tune:#4ae8b4}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 48px;transition:background .3s,color .3s}
.wrap{width:100%;max-width:720px}
.top-bar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:12px}
.toggle-pill{display:flex;border-radius:50px;border:1.5px solid var(--border);overflow:hidden;background:var(--surface2)}
.toggle-pill button{padding:5px 11px;border:none;background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:.72rem;cursor:pointer;transition:all .15s}
.toggle-pill button.active{background:var(--accent);color:#1a1d26;font-weight:600}
header{text-align:center;margin-bottom:28px}
header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,7vw,3.4rem);letter-spacing:.05em;color:var(--accent);line-height:1;margin-bottom:6px}
header p{font-size:.82rem;color:var(--muted);font-weight:300;letter-spacing:.06em;text-transform:uppercase}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 24px;margin-bottom:14px}
.section-label{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.12em;color:var(--muted);margin-bottom:14px}
.key-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.key-lbl{font-size:.75rem;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.key-btns{display:flex;flex-wrap:wrap;gap:6px}
.key-btn{padding:6px 13px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);font-family:'DM Mono',monospace;font-size:.78rem;cursor:pointer;transition:all .15s}
.key-btn:hover{border-color:var(--accent);color:var(--text)}
.key-btn.active{border-color:var(--accent);background:rgba(232,200,74,.15);color:var(--accent);font-weight:500}
.tuner-inner{text-align:center}
.pitch-big{font-family:'Bebas Neue',sans-serif;font-size:5rem;line-height:1;color:var(--muted);letter-spacing:.05em;min-height:80px;display:flex;align-items:center;justify-content:center;transition:color .1s}
.pitch-big.on{color:var(--accent2)}.pitch-big.bend{color:#e88c32}.pitch-big.blowbend{color:#e88c32}.pitch-big.oob{color:var(--danger)}
.freq-sub{font-size:.75rem;color:var(--muted);font-family:'DM Mono',monospace;margin-top:4px;min-height:18px}
.cents-wrap{position:relative;height:6px;background:var(--surface2);border-radius:3px;margin:14px auto;max-width:320px;border:1px solid var(--border)}
.cents-fill{position:absolute;height:100%;border-radius:3px;top:0;transition:all .07s}
.cents-mid{position:absolute;left:50%;top:-4px;width:2px;height:14px;background:var(--border);transform:translateX(-50%);border-radius:1px}
.cents-lbl{font-size:.72rem;color:var(--muted);font-family:'DM Mono',monospace}
.badge{display:inline-block;font-size:.72rem;padding:3px 12px;border-radius:999px;font-family:'DM Mono',monospace;margin-top:8px;letter-spacing:.06em;border:1px solid transparent}
.badge.intune{background:rgba(74,232,180,.12);color:var(--in-tune);border-color:rgba(74,232,180,.3)}
.badge.sharp,.badge.flat,.badge.bend{background:rgba(232,200,74,.12);color:#c9a800;border-color:rgba(232,200,74,.3)}
.badge.blowbend{background:rgba(232,140,50,.12);color:#e88c32;border-color:rgba(232,140,50,.3)}
.badge.idle{background:var(--surface2);color:var(--muted);border-color:var(--border)}
.badge.oob{background:rgba(232,74,74,.12);color:var(--danger);border-color:rgba(232,74,74,.3)}
.mic-row{display:flex;justify-content:center;gap:10px;margin-top:14px;flex-wrap:wrap}
.mic-btn{display:inline-flex;align-items:center;gap:10px;padding:10px 24px;border-radius:50px;border:2px solid var(--border);background:var(--surface2);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.85rem;cursor:pointer;transition:all .2s}
.mic-btn:hover{border-color:var(--accent2);color:var(--text)}
.mic-btn.on{border-color:var(--in-tune);color:var(--in-tune);background:rgba(74,232,180,.08)}
.mic-btn.auto-on{border-color:var(--purple);color:var(--purple);background:rgba(136,85,221,.08)}
.mic-dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex-shrink:0}
.mic-btn.on .mic-dot,.mic-btn.auto-on .mic-dot{animation:pulse 1.2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.leg-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.leg{display:flex;align-items:center;gap:6px;font-size:.7rem;color:var(--muted)}
.leg-sq{width:11px;height:11px;border-radius:3px;border:1.5px solid}
.harp-scroll{overflow-x:auto;padding-bottom:8px}
.harp-row{display:flex;gap:5px;align-items:center;margin-bottom:5px}
.harp-lbl{width:72px;min-width:72px;font-size:.63rem;color:var(--muted);text-align:right;padding-right:8px;font-family:'DM Sans',sans-serif}
.harp-cells{display:flex;gap:5px;flex:1}
.hcell{flex:1;min-width:0;height:50px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:.82rem;font-weight:600;border-radius:8px;border:1.5px solid transparent;transition:all .13s}
.hcell.blow{background:rgba(74,232,180,.1);color:var(--accent2);border-color:rgba(74,232,180,.3)}
.hcell.draw{background:rgba(232,200,74,.1);color:var(--accent);border-color:rgba(232,200,74,.3)}
.hcell.blow.active{background:rgba(74,232,180,.35);border-color:var(--accent2);box-shadow:0 0 12px rgba(74,232,180,.4);transform:scale(1.06)}
.hcell.draw.active{background:rgba(232,200,74,.35);border-color:var(--accent);box-shadow:0 0 12px rgba(232,200,74,.4);transform:scale(1.06)}
.hole-wrap{display:flex;flex:1;border-radius:8px;padding:3px 0}
.hole-num{flex:1;min-width:0;height:26px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:.95rem;color:#fff}
.hbend{flex:1;min-width:0;height:38px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:.72rem;font-weight:600;border-radius:8px;border:1.5px solid transparent;transition:all .13s}
.hbend.empty{background:transparent;border-color:transparent;color:transparent;pointer-events:none}
.hbend.blowbend1,.hbend.drawbend1{background:rgba(232,140,50,.1);color:#e88c32;border-color:rgba(232,140,50,.35)}
.hbend.drawbend2{background:rgba(232,74,74,.1);color:#e84a4a;border-color:rgba(232,74,74,.35)}
.hbend.drawbend3{background:rgba(139,90,43,.1);color:#8b5a2b;border-color:rgba(139,90,43,.35)}
.hbend.blowbend1.active,.hbend.drawbend1.active{background:rgba(232,140,50,.3);border-color:#e88c32;box-shadow:0 0 10px rgba(232,140,50,.4);transform:scale(1.06)}
.hbend.drawbend2.active{background:rgba(232,74,74,.3);border-color:#e84a4a;box-shadow:0 0 10px rgba(232,74,74,.4);transform:scale(1.06)}
.hbend.drawbend3.active{background:rgba(139,90,43,.3);border-color:#8b5a2b;box-shadow:0 0 10px rgba(139,90,43,.4);transform:scale(1.06)}
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.btn{display:inline-block;padding:7px 14px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:.78rem;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'DM Sans',sans-serif;text-align:center;line-height:1.4;user-select:none;-webkit-user-select:none}
.btn:hover:not(:disabled){border-color:var(--accent);color:var(--text)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn.primary{border-color:var(--accent2);color:var(--accent2)}
.btn.primary:hover:not(:disabled){background:rgba(74,232,180,.1)}
.btn.primary.bend{border-color:#e88c32;color:#e88c32}
.btn.primary.blowbend{border-color:#e88c32;color:#e88c32}
.btn.danger{border-color:rgba(232,74,74,.4);color:var(--danger)}
.btn.danger:hover:not(:disabled){background:rgba(232,74,74,.1)}
.spacer{flex:1}
.sel-bar{display:none;align-items:center;gap:8px;font-size:.75rem;background:rgba(136,85,221,.08);color:var(--purple);border:1px solid rgba(136,85,221,.3);border-radius:8px;padding:5px 12px;font-family:'DM Mono',monospace}
.sel-bar.on{display:inline-flex}
.tab-notes{display:block;min-height:52px;padding:4px 0;margin-bottom:14px}
.tab-row{display:flex;flex-wrap:wrap;gap:6px;align-items:flex-start;min-height:44px;padding:4px 0 10px;border-bottom:1.5px dashed var(--border)}
.tab-row:last-child{border-bottom:none}
.chip{display:inline-flex;flex-direction:column;align-items:center;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;min-width:40px;cursor:pointer;transition:all .13s;user-select:none}
.chip:hover{border-color:var(--muted)}
.chip.sel{background:rgba(136,85,221,.1);border-color:var(--purple)}
.chip .arr{font-size:1.2rem;line-height:1;font-family:'DM Mono',monospace}
.chip.blow .arr{color:var(--accent2)}.chip.draw .arr{color:var(--accent)}
.chip.drawbend1 .arr,.chip.blowbend1 .arr{color:#e88c32}
.chip.drawbend2 .arr,.chip.blowbend2 .arr{color:#e84a4a}
.chip.drawbend3 .arr{color:#8b5a2b}
.chip .hn{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--text);line-height:1}
.chip .nn{font-size:.6rem;color:var(--muted);font-family:'DM Mono',monospace}
.chip.sel .hn,.chip.sel .nn{color:var(--purple)}
.chip.separator{background:transparent;border:1.5px dashed var(--border);font-family:'DM Mono',monospace;font-size:1rem;min-width:24px;padding:6px 8px}
.empty-msg{font-size:.8rem;color:var(--muted);padding:6px 0;font-family:'DM Mono',monospace}
.txt-out{padding:10px 14px;background:var(--surface2);border-radius:8px;font-family:'DM Mono',monospace;font-size:.95rem;color:var(--text);letter-spacing:2px;word-break:break-all;min-height:40px;border:1px solid var(--border);user-select:all;margin-bottom:10px}
.btm-row{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.metro-beats{display:flex;justify-content:center;gap:10px;margin-bottom:16px}
.metro-beat{width:38px;height:38px;border-radius:50%;border:2px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:.85rem;color:var(--muted);transition:all .08s}
.metro-beat.accent{background:var(--accent);border-color:var(--accent);color:#1a1d26;box-shadow:0 0 16px rgba(232,200,74,.5);transform:scale(1.15)}
.metro-beat.normal{background:var(--accent2);border-color:var(--accent2);color:#1a1d26;box-shadow:0 0 12px rgba(74,232,180,.4);transform:scale(1.08)}
.metro-controls{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.metro-bpm-btn{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-size:1.3rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.metro-bpm-btn:hover{border-color:var(--accent);color:var(--accent)}
.metro-bpm-display{display:flex;flex-direction:column;align-items:center;min-width:70px}
.metro-bpm-val{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;color:var(--accent);line-height:1}
.metro-bpm-lbl{font-size:.62rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
.metro-start-btn{padding:10px 24px;border-radius:50px;border:2px solid var(--accent2);background:transparent;color:var(--accent2);font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.1em;cursor:pointer;transition:all .15s}
.metro-start-btn:hover,.metro-start-btn.running{background:var(--accent2);color:#1a1d26}
.metro-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px;flex-wrap:wrap}
.metro-row-lbl{font-size:.72rem;color:var(--muted)}
.metro-btns{display:flex;gap:6px;flex-wrap:wrap}
.metro-btn{padding:5px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);font-family:'DM Mono',monospace;font-size:.75rem;cursor:pointer;transition:all .15s}
.metro-btn:hover{border-color:var(--accent);color:var(--text)}
.metro-btn.active{border-color:var(--accent);background:rgba(232,200,74,.15);color:var(--accent)}
.sess-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sess-hdr h2{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.12em;color:var(--muted)}
.sess-list{display:flex;flex-direction:column;gap:6px}
.sess-row{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s}
.sess-row:hover{border-color:var(--muted)}.sess-row.active{border-color:var(--accent2);background:rgba(74,232,180,.06)}
.sess-name{flex:1;font-size:.82rem;color:var(--text)}
.sess-name input{background:transparent;border:none;outline:none;color:var(--text);font-size:.82rem;width:100%;font-family:'DM Sans',sans-serif}
.sess-row.active .sess-name{color:var(--in-tune)}
.sess-meta{font-size:.65rem;color:var(--muted);font-family:'DM Mono',monospace;white-space:nowrap}
.sess-del{font-size:.8rem;color:var(--muted);background:transparent;border:none;cursor:pointer;padding:2px 6px;border-radius:4px;transition:all .15s}
.sess-del:hover{color:var(--danger);background:rgba(232,74,74,.1)}
.sess-empty{font-size:.8rem;color:var(--muted);font-family:'DM Mono',monospace}
</style>
</head>
<body>
<div class="wrap">
<div class="top-bar">
  <div class="toggle-pill">
    <button id="btnIT" class="active" onclick="setLang('it')">IT</button>
    <button id="btnEN" onclick="setLang('en')">EN</button>
  </div>
  <div class="toggle-pill">
    <button id="themeLight" class="active" onclick="setTheme('light')">☀️</button>
    <button id="themeDark" onclick="setTheme('dark')">🌙</button>
  </div>
</div>
<header>
  <h1>Harmonica Lab Tab Transcriber</h1>
  <p id="subTitle"></p>
</header>
<div class="card">
  <div class="key-row">
    <span class="key-lbl" id="keyLbl"></span>
    <div class="key-btns" id="keyBtns"></div>
  </div>
</div>
<div class="card">
  <div class="tuner-inner">
    <div class="pitch-big" id="pitchBig">—</div>
    <div class="freq-sub" id="freqSub"></div>
    <div class="cents-wrap">
      <div class="cents-fill" id="cFill" style="left:50%;width:0"></div>
      <div class="cents-mid"></div>
    </div>
    <div class="cents-lbl" id="cLbl">— ct</div><br>
    <span class="badge idle" id="badge"></span>
    <div class="mic-row">
      <button class="mic-btn" id="micBtn" onclick="toggleMic()"><span class="mic-dot"></span><span id="micLbl"></span></button>
      <button class="mic-btn" id="autoBtn" onclick="toggleAuto()"><span class="mic-dot"></span><span id="autoLbl">Auto 1s</span></button>
    </div>
  </div>
</div>
<div class="card">
  <h2 class="section-label" id="gridTitle"></h2>
  <div class="leg-row">
    <div class="leg"><div class="leg-sq" style="border-color:rgba(74,232,180,.6);background:rgba(74,232,180,.1)"></div><span id="legBlow"></span></div>
    <div class="leg"><div class="leg-sq" style="border-color:rgba(232,200,74,.6);background:rgba(232,200,74,.1)"></div><span id="legDraw"></span></div>
    <div class="leg"><div class="leg-sq" style="border-color:rgba(232,140,50,.6);background:rgba(232,140,50,.1)"></div><span id="legBend1"></span></div>
    <div class="leg"><div class="leg-sq" style="border-color:rgba(232,74,74,.6);background:rgba(232,74,74,.1)"></div><span id="legBend2"></span></div>
    <div class="leg"><div class="leg-sq" style="border-color:rgba(139,90,43,.6);background:rgba(139,90,43,.1)"></div><span id="legBend3"></span></div>
  </div>
  <div class="harp-scroll" id="harpVisual"></div>
</div>
<div class="card">
  <h2 class="section-label" id="tabTitle"></h2>
  <div class="toolbar">
    <button class="btn primary" id="addBtn" onclick="addNote()" disabled></button>
    <button class="btn" id="replaceBtn" onclick="replaceNote()" style="display:none;border-color:#8855dd;color:#8855dd">⟳ <span id="replaceLbl"></span></button>
    <button class="btn" onclick="addSeparator()"><span style="pointer-events:none;display:block;width:100%;text-align:center">| <span id="sepLbl"></span></span></button>
    <button class="btn" onclick="addNewline()"><span style="pointer-events:none;display:block;width:100%;text-align:center">↵ <span id="nlLbl"></span></span></button>
    <div class="spacer"></div>
    <button class="btn" id="undoBtn" onclick="undo()" disabled id="undoBtn"></button>
    <button class="btn" id="redoBtn" onclick="redo()" disabled></button>
    <button class="btn danger" id="clearBtn" onclick="clearAll()"></button>
  </div>
  <span class="sel-bar" id="selBar">
    <span id="selCount">0</span> <span id="selLbl"></span>&nbsp;
    <button class="btn danger" style="padding:2px 9px;font-size:.7rem" onclick="deleteSelected()" id="delBtn"></button>
    <button class="btn" style="padding:2px 9px;font-size:.7rem" onclick="clearSel()">✕</button>
  </span>
  <div class="tab-notes" id="tabNotes"></div>
  <div class="txt-out" id="txtOut">—</div>
  <div class="btm-row">
    <button class="btn" id="copyBtn" onclick="copyTab()"></button>
    <button class="btn" onclick="exportPDF()">📄 <span id="pdfLbl"></span></button>
    <button class="btn primary" onclick="saveSession()" id="saveBtn"></button>
  </div>
</div>
<div class="card">
  <h2 class="section-label" id="metroTitle"></h2>
  <div class="metro-beats" id="metroBeats"></div>
  <div class="metro-controls">
    <button class="metro-bpm-btn" id="bpmDown" onclick="bpmChange(-1)">−</button>
    <div class="metro-bpm-display">
      <div class="metro-bpm-val" id="bpmVal">80</div>
      <div class="metro-bpm-lbl">BPM</div>
    </div>
    <button class="metro-bpm-btn" id="bpmUp" onclick="bpmChange(1)">+</button>
    <button class="metro-start-btn" id="metroStartBtn" onclick="toggleMetro()">▶ Start</button>
  </div>
  <div class="metro-row">
    <span class="metro-row-lbl" id="metroTimeLbl"></span>
    <div class="metro-btns">
      <button class="metro-btn active" onclick="setTimeSig(4,this)">4/4</button>
      <button class="metro-btn" onclick="setTimeSig(3,this)">3/4</button>
      <button class="metro-btn" onclick="setTimeSig(2,this)">2/4</button>
    </div>
  </div>
  <div class="metro-row" style="margin-top:8px">
    <span class="metro-row-lbl">Feel:</span>
    <div class="metro-btns" id="feelBtns">
      <button class="metro-btn active" onclick="setFeel('straight',this)">Straight</button>
      <button class="metro-btn" onclick="setFeel('swing',this)">Swing</button>
      <button class="metro-btn" onclick="setFeel('blues',this)">Blues</button>
    </div>
  </div>
</div>
<div class="card">
  <div class="sess-hdr">
    <h2 id="sessTitle"></h2>
    <button class="btn primary" onclick="newSession()" id="newSessBtn"></button>
  </div>
  <div class="sess-list" id="sessList"></div>
</div>
<div style="text-align:center;padding:16px 0 4px;font-size:.65rem;color:var(--muted);font-family:'DM Mono',monospace">
  © 2025 HarmonicaLab · CC BY-NC 4.0 · <a href="https://harmonicalab.github.io/harmonica" target="_blank" style="color:var(--muted);text-decoration:none">harmonicalab.github.io</a>
</div>
</div>
<script>
var lang = 'it';
var TX = {
  it: {
    sub:'Armonica diatonica in', key:'Tonalità:', grid:'Griglia note', tab:'Tablatura',
    micOn:'Attiva microfono', micOff:'Stop',
    idle:'in attesa', silence:'silenzio', intune:'in tune', high:'troppo alta', low:'troppo bassa',
    blowbend:'blow bend', drawbend:'bend rilevato', oob:'fuori range',

var NNAMES = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
function mn(m) { return NNAMES[((m%12)+12)%12]; }
function midi2hz(m) { return 440*Math.pow(2,(m-69)/12); }
var BASE_BLOW = [0,4,7,12,16,19,24,28,31,36];
var BASE_DRAW = [2,7,11,14,17,21,23,26,29,33];
var BASE_DB1  = [1,6,10,13,null,null,null,null,null,null];
var BASE_DB2  = [null,5,9,null,null,null,null,null,null,null];
var BASE_DB3  = [null,null,8,null,null,null,null,null,null,null];
var BASE_BB1  = [null,null,null,null,null,null,22,27,30,35];
var KEYS = [
  {name:'C',root:60},{name:'D',root:62},{name:'E',root:64},{name:'F',root:65},
  {name:'G',root:67},{name:'A',root:57},{name:'Bb',root:58},{name:'Ab',root:56},
  {name:'F#',root:66},{name:'Low F',root:53},{name:'Low D',root:50},{name:'Low C',root:48}
];
var currentKey = KEYS[0], HMAP = [];

function buildMap(key) {
  var r = key.root, m = [];
  for (var i=0; i<10; i++) {
    var h = i+1;
    m.push({midi:r+BASE_BLOW[i],hz:midi2hz(r+BASE_BLOW[i]),hole:h,dir:'blow',sym:'↑',semis:0,blowbend:false});
    m.push({midi:r+BASE_DRAW[i],hz:midi2hz(r+BASE_DRAW[i]),hole:h,dir:'draw',sym:'↓',semis:0,blowbend:false});
    if (BASE_DB1[i]!=null) m.push({midi:r+BASE_DB1[i],hz:midi2hz(r+BASE_DB1[i]),hole:h,dir:'drawbend1',sym:"↓'",semis:1,blowbend:false});
    if (BASE_DB2[i]!=null) m.push({midi:r+BASE_DB2[i],hz:midi2hz(r+BASE_DB2[i]),hole:h,dir:'drawbend2',sym:"↓''",semis:2,blowbend:false});
    if (BASE_DB3[i]!=null) m.push({midi:r+BASE_DB3[i],hz:midi2hz(r+BASE_DB3[i]),hole:h,dir:'drawbend3',sym:"↓'''",semis:3,blowbend:false});
    if (BASE_BB1[i]!=null) m.push({midi:r+BASE_BB1[i],hz:midi2hz(r+BASE_BB1[i]),hole:h,dir:'blowbend1',sym:"↑'",semis:1,blowbend:true});
  }
  if (key.root>=65) {
    var rL = key.root-12;
    for (var i=0; i<3; i++) {
      var h = i+1;
      m.push({midi:rL+BASE_BLOW[i],hz:midi2hz(rL+BASE_BLOW[i]),hole:h,dir:'blow',sym:'↑',semis:0,blowbend:false});
      m.push({midi:rL+BASE_DRAW[i],hz:midi2hz(rL+BASE_DRAW[i]),hole:h,dir:'draw',sym:'↓',semis:0,blowbend:false});
      if (BASE_DB1[i]!=null) m.push({midi:rL+BASE_DB1[i],hz:midi2hz(rL+BASE_DB1[i]),hole:h,dir:'drawbend1',sym:"↓'",semis:1,blowbend:false});
      if (BASE_DB2[i]!=null) m.push({midi:rL+BASE_DB2[i],hz:midi2hz(rL+BASE_DB2[i]),hole:h,dir:'drawbend2',sym:"↓''",semis:2,blowbend:false});
      if (BASE_DB3[i]!=null) m.push({midi:rL+BASE_DB3[i],hz:midi2hz(rL+BASE_DB3[i]),hole:h,dir:'drawbend3',sym:"↓'''",semis:3,blowbend:false});
    }
  }
  return m;
}
function findClosest(hz) {
  var best=null, bd=9999;
  for (var i=0; i<HMAP.length; i++) {
    var d = Math.abs(HMAP[i].hz-hz);
    if (d<bd) { bd=d; best=HMAP[i]; }
  }
  if (!best) return null;
  var cents = Math.round(1200*Math.log2(hz/best.hz));
  if (Math.abs(cents)>150) return null;
  return {midi:best.midi,hz:best.hz,hole:best.hole,dir:best.dir,sym:best.sym,semis:best.semis,blowbend:best.blowbend,cents:cents};
}

function buildHarpVisual() {
  var vis=document.getElementById('harpVisual'); if(!vis) return;
  vis.innerHTML='';
  var r=currentKey.root, isDark=document.body.classList.contains('dark');

  function makeRow(lbl, cells) {

    var l=document.createElement('div'); l.className='harp-lbl'; l.textContent=lbl;
    var c=document.createElement('div'); c.className='harp-cells';

  }
  function makeCell(cls,txt,id) {
    var el=document.createElement('div'); el.className=cls; el.textContent=txt;

  var bbCells=[];

  }
  vis.appendChild(makeRow(t('rowBB'),bbCells));

  var blowCells=[];
  for (var i=0; i<10; i++) blowCells.push(makeCell('hcell blow',mn(r+BASE_BLOW[i]),'hv_blow_'+(i+1)));
  vis.appendChild(makeRow(t('rowBlow'),blowCells));

  var holeRow=document.createElement('div'); holeRow.className='harp-row';
  var hLbl=document.createElement('div'); hLbl.className='harp-lbl'; hLbl.textContent='Foro';
  var hWrap=document.createElement('div'); hWrap.className='hole-wrap harp-cells'; hWrap.style.background=holeBg;
  for (var i=0; i<10; i++) hWrap.appendChild(makeCell('hole-num',i+1,''));
  holeRow.appendChild(hLbl); holeRow.appendChild(hWrap); vis.appendChild(holeRow);

  var drawCells=[];
  for (var i=0; i<10; i++) drawCells.push(makeCell('hcell draw',mn(r+BASE_DRAW[i]),'hv_draw_'+(i+1)));
  vis.appendChild(makeRow(t('rowDraw'),drawCells));

  var bends=[
    {arr:BASE_DB1,cls:'drawbend1',key:'db1',lbl:t('rowDB1')},
    {arr:BASE_DB2,cls:'drawbend2',key:'db2',lbl:t('rowDB2')},
    {arr:BASE_DB3,cls:'drawbend3',key:'db3',lbl:t('rowDB3')}
  ];
  for (var b=0; b<bends.length; b++) {
    var bend=bends[b], hasAny=false;
    for (var i=0; i<bend.arr.length; i++) { if (bend.arr[i]!=null) { hasAny=true; break; } }
    if (!hasAny) continue;
    var cells=[];
    for (var i=0; i<10; i++) {
      var midi=bend.arr[i]!=null?r+bend.arr[i]:null;
      cells.push(makeCell(midi?'hbend '+bend.cls:'hbend empty',midi?mn(midi):'',midi?'hv_'+bend.key+'_'+(i+1):''));
    }
    vis.appendChild(makeRow(bend.lbl,cells));
  }
}

// AUDIO
var actx=null,analyser=null,stream=null,raf=null,listening=false,curMatch=null,lastStableMatch=null;
var autoCapture=false,autoTimer=null,autoHoldMatch=null;

function toggleAuto() {
  autoCapture=!autoCapture;
  var btn=document.getElementById('autoBtn'), lbl=document.getElementById('autoLbl');
  if (autoCapture) { btn.classList.add('auto-on'); lbl.textContent='Auto ON'; }
  else { btn.classList.remove('auto-on'); lbl.textContent='Auto 1s'; resetAutoTimer(); }
}
function resetAutoTimer() {
  clearTimeout(autoTimer); autoTimer=null; autoHoldMatch=null;
  document.getElementById('cFill').style.width='0';
}
function tickAuto(match) {
  if (!autoCapture||!match) return;
  if (!autoHoldMatch||autoHoldMatch.hole!==match.hole||autoHoldMatch.dir!==match.dir) {
    resetAutoTimer(); autoHoldMatch=match;
    var start=Date.now();
    function tick() {
      var pct=Math.min((Date.now()-start)/1000,1);
      var fill=document.getElementById('cFill');
      fill.style.left='0'; fill.style.width=(pct*100)+'%'; fill.style.background='#8855dd';
      if (pct>=1) {
        snap(); tabList.push(copyNote(match)); render(); autoHoldMatch=null;
        setTimeout(function(){ document.getElementById('cFill').style.width='0'; },300);
      } else { autoTimer=setTimeout(tick,30); }
    }
    autoTimer=setTimeout(tick,30);
  }
}
function copyNote(n) { return {midi:n.midi,hz:n.hz,hole:n.hole,dir:n.dir,sym:n.sym,semis:n.semis,blowbend:n.blowbend,cents:n.cents}; }

function detectPitch(buf,sr) {
  var N=buf.length, rms=0;
  for (var i=0;i<N;i++) rms+=buf[i]*buf[i];
  rms=Math.sqrt(rms/N); if (rms<0.002) return -1;
  var tauMin=Math.floor(sr/2200), tauMax=Math.floor(sr/80), W=Math.min(Math.floor(N/2),tauMax+1);
  var d=new Float32Array(W);
  for (var tau=tauMin;tau<W;tau++) for (var j=0;j<W;j++) { var diff=buf[j]-buf[j+tau]; d[tau]+=diff*diff; }
  var dn=new Float32Array(W); dn[0]=1; var rs=0;
  for (var tau=1;tau<W;tau++) { rs+=d[tau]; dn[tau]=rs===0?0:(d[tau]*tau)/rs; }
  var th=0.15, tau=-1;
  for (var tt=tauMin;tt<W-1;tt++) { if (dn[tt]<th&&dn[tt]<=dn[tt+1]) { tau=tt; break; } }
  if (tau===-1) {
    var mv=Infinity, mi=tauMin;
    for (var tt=tauMin;tt<W;tt++) { if (dn[tt]<mv) { mv=dn[tt]; mi=tt; } }
    if (mv>0.35) return -1; tau=mi;
  }
  if (tau<=0||tau>=W-1) return sr/tau;
  var x1=dn[tau-1],x2=dn[tau],x3=dn[tau+1];
  var denom=2*x2-x1-x3, adj=denom===0?0:(x3-x1)/(2*denom);
  var refined=tau+adj;
  var ht=Math.round(refined/2);
  if (ht>=tauMin&&ht<W&&dn[ht]<th*1.5) {
    var fH=sr/ht, fF=sr/refined;
    var dH=9999,dF=9999;
    for (var i=0;i<HMAP.length;i++) {
      var ah=Math.abs(HMAP[i].hz-fH), af=Math.abs(HMAP[i].hz-fF);
      if (ah<dH) dH=ah; if (af<dF) dF=af;
    }
    if (dH<dF) return fH;
  }
  return sr/refined;
}

function toggleMic() {
  if (!listening) {
    navigator.mediaDevices.getUserMedia({audio:true,video:false}).then(function(s){
      stream=s; actx=new(window.AudioContext||window.webkitAudioContext)();
      analyser=actx.createAnalyser(); analyser.fftSize=8192;
      actx.createMediaStreamSource(stream).connect(analyser);
      listening=true; document.getElementById('micBtn').classList.add('on');
      document.getElementById('micLbl').textContent=t('micOff'); loop();
    }).catch(function(e){ document.getElementById('freqSub').textContent='Errore: '+e.message; });
  } else { stopMic(); }
}
function stopMic() {
  listening=false; cancelAnimationFrame(raf);
  if (stream) stream.getTracks().forEach(function(tr){ tr.stop(); });
  if (actx) actx.close();
  document.getElementById('micBtn').classList.remove('on');
  document.getElementById('micLbl').textContent=t('micOn');
  document.getElementById('pitchBig').textContent='—'; document.getElementById('pitchBig').className='pitch-big';
  document.getElementById('freqSub').textContent=''; document.getElementById('cFill').style.width='0';
  document.getElementById('cLbl').textContent='— ct';
  setBadge('idle',t('idle')); setAddBtn(false,null); highlight(null); curMatch=null; resetAutoTimer();
}
function setBadge(cls,txt) { var b=document.getElementById('badge'); b.className='badge '+cls; b.textContent=txt; }
function setAddBtn(on,match) {
  var ab=document.getElementById('addBtn'), rb=document.getElementById('replaceBtn'), rl=document.getElementById('replaceLbl');
  ab.disabled=!on;
  if (!on) { ab.textContent=t('add'); ab.className='btn primary'; }
  else {
    var isDB=match.dir.indexOf('drawbend')===0, isBB=match.blowbend;
    ab.className='btn primary'+(isDB?' bend':isBB?' blowbend':'');
    ab.innerHTML='<span style="pointer-events:none;display:block;width:100%;text-align:center">+ '+match.sym+match.hole+' ('+mn(match.midi)+')</span>';
  }
  if (selected.size===1) {
    rb.style.display=''; rb.disabled=false;
    rl.textContent=t('replace')+(match?' '+match.sym+match.hole:'...');
  } else { rb.style.display='none'; }
}
function loop() {
  if (!listening) return;
  raf=requestAnimationFrame(loop);
  var buf=new Float32Array(analyser.fftSize); analyser.getFloatTimeDomainData(buf);
  var rms=0; for (var i=0;i<buf.length;i++) rms+=buf[i]*buf[i]; rms=Math.sqrt(rms/buf.length);
  if (rms<0.002) {
    curMatch=null;
    document.getElementById('pitchBig').textContent='—'; document.getElementById('pitchBig').className='pitch-big';
    document.getElementById('freqSub').textContent='';
    if (!autoCapture) { document.getElementById('cFill').style.width='0'; document.getElementById('cLbl').textContent='— ct'; }
    setBadge('idle',t('silence')); highlight(null); setAddBtn(false,null); resetAutoTimer(); return;
  }
  var freq=detectPitch(buf,actx.sampleRate);
  if (freq>80&&freq<2200) {
    var match=findClosest(freq);
    if (match) {
      curMatch=match; lastStableMatch=match;
      var pb=document.getElementById('pitchBig');
      pb.textContent=mn(match.midi)+' '+match.sym+match.hole;
      pb.className='pitch-big '+(match.blowbend?'blowbend':match.dir.indexOf('drawbend')===0?'bend':'on');
      document.getElementById('freqSub').textContent=freq.toFixed(1)+' Hz';
      var ct=match.cents, pct=Math.min(Math.max((ct+50)/100,0),1);
      if (!autoCapture) {
        var fill=document.getElementById('cFill');
        if (ct>=0) { fill.style.left='50%'; fill.style.width=Math.min(pct*100,50)+'%'; }
        else { var w=(0.5-pct)*100; fill.style.left=(50-w)+'%'; fill.style.width=w+'%'; }
        fill.style.background=Math.abs(ct)<=20?'#4ae8b4':'#e8c84a';
        document.getElementById('cLbl').textContent=(ct>=0?'+':'')+ct+' ct';
      }
      var tun=Math.abs(ct)<=20;
      var bc=tun?(match.blowbend?'blowbend':match.dir.indexOf('drawbend')===0?'bend':'intune'):(ct>20?'sharp':'flat');
      var bl=tun?(match.blowbend?t('blowbend'):match.dir.indexOf('drawbend')===0?t('drawbend'):t('intune')):(ct>20?t('high'):t('low'));
      setBadge(bc,bl); highlight(match); setAddBtn(true,match); tickAuto(match);
    } else {
      curMatch=null;
      document.getElementById('pitchBig').textContent='?'; document.getElementById('pitchBig').className='pitch-big oob';
      document.getElementById('freqSub').textContent=freq.toFixed(1)+' Hz';
      setBadge('oob',t('oob')); highlight(null); setAddBtn(false,null); resetAutoTimer();
    }
  } else {
    curMatch=null;
    document.getElementById('pitchBig').textContent='—'; document.getElementById('pitchBig').className='pitch-big';
    document.getElementById('freqSub').textContent='';
    if (!autoCapture) { document.getElementById('cFill').style.width='0'; document.getElementById('cLbl').textContent='— ct'; }
    setBadge('idle',t('silence')); highlight(null); setAddBtn(false,null); resetAutoTimer();
  }
}

// TAB
var tabList=[],selected=new Set(),hist=[[]],histIdx=0;
function snap() { hist=hist.slice(0,histIdx+1); hist.push(tabList.map(function(x){return copyObj(x);})); histIdx++; upUD(); }
function copyObj(x) { if (!x) return x; var o={}; for (var k in x) o[k]=x[k]; return o; }
function undo() { if(histIdx>0){histIdx--;tabList=hist[histIdx].map(copyObj);selected.clear();render();upUD();} }
function redo() { if(histIdx<hist.length-1){histIdx++;tabList=hist[histIdx].map(copyObj);selected.clear();render();upUD();} }
function upUD() { document.getElementById('undoBtn').disabled=histIdx<=0; document.getElementById('redoBtn').disabled=histIdx>=hist.length-1; }
function addNote() { if(!curMatch&&!lastStableMatch)return; snap(); tabList.push(copyNote(curMatch||lastStableMatch)); render(); }
function replaceNote() {
  if(!curMatch&&!lastStableMatch) return; if(selected.size!==1) return;
  var idx=Array.from(selected)[0]; snap(); tabList[idx]=copyNote(curMatch||lastStableMatch); selected.clear(); render();
}
function addSeparator() { snap(); tabList.push({type:'separator'}); render(); }
function addNewline() { snap(); tabList.push({type:'newline'}); render(); }
function toggleSel(i) {
  if(selected.has(i))selected.delete(i);else selected.add(i); render();
  setAddBtn(!!(curMatch||lastStableMatch),curMatch||lastStableMatch);
}
function clearSel() { selected.clear(); render(); }
function deleteSelected() { if(!selected.size)return; snap(); tabList=tabList.filter(function(_,i){return !selected.has(i);}); selected.clear(); render(); }
function clearAll() { if(!tabList.length)return; snap(); tabList=[]; selected.clear(); render(); }

function render() {
  var cont=document.getElementById('tabNotes'), txt=document.getElementById('txtOut');
  var sb=document.getElementById('selBar'), sc=document.getElementById('selCount');
  if (!tabList.length) { cont.innerHTML='<span class="empty-msg">'+t('noNotes')+'</span>'; txt.textContent='—'; sb.classList.remove('on'); return; }
  var lines=[[]], str='';
  for (var i=0;i<tabList.length;i++) {
    var n=tabList[i];
    if (n.type==='newline') { lines.push([]); str+='\n'; }
    else { lines[lines.length-1].push({n:n,i:i}); str+=(n.type==='separator'?'| ':n.sym+n.hole+' '); }
  }
  cont.innerHTML='';
  for (var r=0;r<lines.length;r++) {
    var line=lines[r], rowEl=document.createElement('div'); rowEl.className='tab-row';
    for (var c=0;c<line.length;c++) {
      var item=line[c], n=item.n, idx=item.i;
      var chip=document.createElement('div');
      if (n.type==='separator') {
        chip.className='chip separator'+(selected.has(idx)?' sel':'');
        chip.innerHTML='<span style="pointer-events:none">|</span>';
      } else {
        chip.className='chip '+n.dir+(selected.has(idx)?' sel':'');
        chip.innerHTML='<span style="pointer-events:none;display:contents"><span class="arr">'+n.sym+'</span><span class="hn">'+n.hole+'</span><span class="nn">'+mn(n.midi)+'</span></span>';
      }
      chip.onclick=(function(ii){return function(){toggleSel(ii);};})(idx);
      rowEl.appendChild(chip);
    }
    cont.appendChild(rowEl);
  }
  txt.textContent=str.trim();
  if(selected.size>0){sb.classList.add('on');sc.textContent=selected.size;}else sb.classList.remove('on');
  setAddBtn(!!(curMatch||lastStableMatch),curMatch||lastStableMatch);
}

function copyTab() {
  var tx=document.getElementById('txtOut').textContent; if(tx==='—')return;
  navigator.clipboard.writeText(tx).then(function(){
    var b=document.getElementById('copyBtn'),o=b.textContent; b.textContent=t('copied');
    setTimeout(function(){b.textContent=t('copy');},1600);
  });
}

// SESSIONI
var sessions=JSON.parse(localStorage.getItem('harp_v4')||'[]'),activeSess=null;
function saveSess() { localStorage.setItem('harp_v4',JSON.stringify(sessions)); }
function saveSession() {
  if(!tabList.length){alert(t('noSave'));return;}
  var str=tabList.filter(function(n){return n.type!=='newline';}).map(function(n){return n.type==='separator'?'|':n.sym+n.hole;}).join(' ');
  if(activeSess!==null){
    var nm=prompt(t('promptName'),sessions[activeSess].name); if(nm===null)return;
    sessions[activeSess].name=nm.trim()||sessions[activeSess].name;
    sessions[activeSess].notes=tabList.slice(); sessions[activeSess].tab=str;
    sessions[activeSess].key=currentKey.name; sessions[activeSess].updated=Date.now();
  } else {
    var def=(lang==='it'?'Sessione ':'Session ')+(sessions.length+1);
    var nm=prompt(t('promptName'),def); if(nm===null)return;
    sessions.push({id:Date.now(),name:nm.trim()||def,notes:tabList.slice(),tab:str,key:currentKey.name,updated:Date.now()});
    activeSess=sessions.length-1;
  }
  saveSess(); renderSess();
}
function loadSession(i) { activeSess=i; tabList=sessions[i].notes.map(copyObj); selected.clear(); hist=[tabList.map(copyObj)]; histIdx=0; upUD(); render(); renderSess(); }
function deleteSession(i,e) {
  e.stopPropagation(); if(!confirm(t('confirmDel')))return;
  sessions.splice(i,1); if(activeSess===i)activeSess=null; else if(activeSess>i)activeSess--;
  saveSess(); renderSess();
}
function newSession() { activeSess=null; tabList=[]; selected.clear(); hist=[[]]; histIdx=0; upUD(); render(); renderSess(); }
function startRename(i,el,e) {
  e.stopPropagation(); var inp=document.createElement('input'); inp.value=sessions[i].name;
  inp.onclick=function(ev){ev.stopPropagation();};
  var done=function(){sessions[i].name=inp.value.trim()||sessions[i].name;saveSess();renderSess();};
  inp.onblur=done; inp.onkeydown=function(ev){if(ev.key==='Enter')done();};
  el.innerHTML=''; el.appendChild(inp); inp.focus();
}
function renderSess() {
  var list=document.getElementById('sessList');
  if(!sessions.length){list.innerHTML='<span class="sess-empty">'+t('noSess')+'</span>';return;}
  list.innerHTML='';
  for (var i=0;i<sessions.length;i++) {
    (function(idx){
      var s=sessions[idx], row=document.createElement('div');
      row.className='sess-row'+(activeSess===idx?' active':'');
      row.onclick=function(){loadSession(idx);};
      var d=new Date(s.updated);
      var ds=d.toLocaleDateString(lang==='it'?'it-IT':'en-GB',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString(lang==='it'?'it-IT':'en-GB',{hour:'2-digit',minute:'2-digit'});
      row.innerHTML='<div class="sess-name" ondblclick="startRename('+idx+',this,event)">'+s.name+'</div>'+
        '<div class="sess-meta">'+(s.key||'C')+' · '+s.notes.length+' '+(lang==='it'?'note':'notes')+' · '+ds+'</div>'+
        '<button class="sess-del" onclick="deleteSession('+idx+',event)">✕</button>';
      list.appendChild(row);
    })(i);
  }
}

// EXPORT PDF

  if(!tabList.length){alert(t('noExport'));return;}
  var date=new Date().toLocaleDateString(lang==='it'?'it-IT':'en-GB',{day:'2-digit',month:'2-digit',year:'numeric'});
  var sessName=activeSess!==null?sessions[activeSess].name:(lang==='it'?'Tablatura':'Tab');
  var colors={blow:'#4ae8b4',draw:'#e8c84a',drawbend1:'#e88c32',blowbend1:'#e88c32',drawbend2:'#e84a4a',blowbend2:'#e84a4a',drawbend3:'#8b5a2b'};
  var bgs={blow:'rgba(74,232,180,.12)',draw:'rgba(232,200,74,.12)',drawbend1:'rgba(232,140,50,.12)',blowbend1:'rgba(232,140,50,.12)',drawbend2:'rgba(232,74,74,.12)',blowbend2:'rgba(232,74,74,.12)',drawbend3:'rgba(139,90,43,.12)'};
  var noteRows=[], lines=[[]];
  for (var i=0;i<tabList.length;i++) {
    var n=tabList[i];
    if(n.type==='newline') lines.push([]); else lines[lines.length-1].push(n);
  }
  for (var l=0;l<lines.length;l++) {

    for (var c=0;c<line.length;c++) {
      var n=line[c];
      if(n.type==='separator') cells.push('<td style="padding:6px 8px;text-align:center;font-family:monospace;border-radius:6px;border:1.5px dashed #aaa"><div style="font-size:18px;font-weight:700">|</div></td>');
      else {
        var col=colors[n.dir]||'#888', bg=bgs[n.dir]||'transparent';
        cells.push('<td style="padding:6px 8px;text-align:center;font-family:monospace;border-radius:6px;background:'+bg+';color:'+col+';border:1px solid '+col+'44"><div style="font-size:16px;opacity:.9">'+n.sym+'</div><div style="font-size:20px;font-weight:700">'+n.hole+'</div><div style="font-size:9px;color:#888">'+mn(n.midi)+'</div></td>');
      }
    }
    noteRows.push('<tr>'+cells.join('<td style="width:3px"></td>')+'</tr><tr style="height:8px"></tr>');
  }
  var tabTxt=tabList.filter(function(n){return n.type!=='newline';}).map(function(n){return n.type==='separator'?'|':n.sym+n.hole;}).join(' ');
  var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+sessName+'</title><style>body{font-family:-apple-system,sans-serif;color:#1a1d26;padding:32px 40px;max-width:800px;margin:0 auto}h1{font-size:22px;font-weight:700;margin-bottom:4px;color:#c9a800}.sub{font-size:12px;color:#888;margin-bottom:24px;text-transform:uppercase;letter-spacing:.06em}.sec{margin-bottom:20px}.sec h2{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;padding-bottom:4px;border-bottom:1px solid #e0e4ec}table{border-collapse:separate;border-spacing:0}.txt{font-family:monospace;font-size:13px;background:#f5f5f5;border-radius:8px;padding:12px 16px;word-break:break-all;letter-spacing:2px;border:1px solid #e0e4ec}.leg{display:flex;gap:14px;flex-wrap:wrap}.li{display:flex;align-items:center;gap:5px;font-size:11px;color:#666}.ls{width:10px;height:10px;border-radius:3px;border:1.5px solid}.foot{margin-top:32px;font-size:11px;color:#ccc;text-align:center}</style></head><body><h1>'+sessName+'</h1><div class="sub">'+t('sub')+' '+currentKey.name+' · '+tabList.length+' '+(lang==='it'?'note':'notes')+' · '+date+'</div><div class="sec"><h2>'+t('pdfLeg')+'</h2><div class="leg"><div class="li"><div class="ls" style="border-color:#4ae8b4;background:rgba(74,232,180,.12)"></div>'+t('legBlow')+'</div><div class="li"><div class="ls" style="border-color:#e8c84a;background:rgba(232,200,74,.12)"></div>'+t('legDraw')+'</div><div class="li"><div class="ls" style="border-color:#e88c32;background:rgba(232,140,50,.12)"></div>'+t('legB1')+'</div><div class="li"><div class="ls" style="border-color:#e84a4a;background:rgba(232,74,74,.12)"></div>'+t('legB2')+'</div><div class="li"><div class="ls" style="border-color:#8b5a2b;background:rgba(139,90,43,.12)"></div>'+t('legB3')+'</div></div></div><div class="sec"><h2>'+t('pdfGraph')+'</h2><table><tbody>'+noteRows.join('')+'</tbody></table></div><div class="sec"><h2>'+t('pdfTxt')+'</h2><div class="txt">'+tabTxt+'</div></div><div class="foot">'+t('pdfFoot')+'</div></body></html>';
  var win=window.open('','_blank'); win.document.write(html); win.document.close(); win.onload=function(){win.print();};
}

// METRONOMO
var metroBpm=80, metroBeats=4, metroCurrent=0, metroRunning=false, metroTimer=null, metroACtx=null, metroFeel='straight';

function getMetroCtx() { if(!metroACtx) metroACtx=new(window.AudioContext||window.webkitAudioContext)(); return metroACtx; }

function playClick(i) {
  var ctx=getMetroCtx(), osc=ctx.createOscillator(), gain=ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination); osc.type='sine';
  var freq, vol;
  if (metroFeel==='swing') { freq=i===0?1100:i===2?900:650; vol=i===0?0.7:i===2?0.5:0.25; }
  else if (metroFeel==='blues') { freq=i===0?1100:i===3?950:650; vol=i===0?0.7:i===3?0.55:0.25; }
  else { freq=i===0?1100:750; vol=i===0?0.7:0.35; }
  osc.frequency.value=freq;
  gain.gain.setValueAtTime(vol,ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.08);
  osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.08);
}

function isAccent(i) {
  if (metroFeel==='swing') return i===0||i===2;
  if (metroFeel==='blues') return i===0||i===3;
  return i===0;
}

function buildMetroBeats() {
  var wrap=document.getElementById('metroBeats'); wrap.innerHTML='';
  for (var i=0;i<metroBeats;i++) {
    var b=document.createElement('div'); b.className='metro-beat'; b.textContent=i+1; wrap.appendChild(b);
  }
}

function metroTick() {
  var beats=document.querySelectorAll('.metro-beat');
  beats.forEach(function(b){ b.classList.remove('accent','normal'); });
  beats[metroCurrent].classList.add(isAccent(metroCurrent)?'accent':'normal');
  playClick(metroCurrent);
  metroCurrent=(metroCurrent+1)%metroBeats;
}

function startMetro() { metroCurrent=0; var iv=Math.round(60000/metroBpm); metroTick(); metroTimer=setInterval(metroTick,iv); }
function stopMetro() { clearInterval(metroTimer); metroTimer=null; document.querySelectorAll('.metro-beat').forEach(function(b){ b.classList.remove('accent','normal'); }); }

function toggleMetro() {
  metroRunning=!metroRunning;
  var btn=document.getElementById('metroStartBtn');
  if (metroRunning) { startMetro(); btn.classList.add('running'); btn.textContent='■ Stop'; }
  else { stopMetro(); btn.classList.remove('running'); btn.textContent='▶ Start'; }
}

function bpmChange(delta) {
  metroBpm=Math.min(300,Math.max(20,metroBpm+delta));
  document.getElementById('bpmVal').textContent=metroBpm;
  if (metroRunning) { stopMetro(); startMetro(); }
}

function setTimeSig(beats,btn) {
  document.querySelectorAll('.metro-btn').forEach(function(b){ if(b.textContent.indexOf('/')>0) b.classList.remove('active'); });
  btn.classList.add('active'); metroBeats=beats; metroCurrent=0; buildMetroBeats();
  if (metroRunning) { stopMetro(); startMetro(); }
}

function setFeel(feel,btn) {
  document.getElementById('feelBtns').querySelectorAll('.metro-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active'); metroFeel=feel; metroCurrent=0;
  if (metroRunning) { stopMetro(); startMetro(); }
}

function setupLongPress(id,fn) {
  var btn=document.getElementById(id), iv=null;
  btn.addEventListener('mousedown',function(){ iv=setInterval(fn,80); });
  btn.addEventListener('touchstart',function(){ iv=setInterval(fn,80); },{passive:true});
  btn.addEventListener('mouseup',function(){ clearInterval(iv); });
  btn.addEventListener('mouseleave',function(){ clearInterval(iv); });
  btn.addEventListener('touchend',function(){ clearInterval(iv); });
}

// INIT
var savedTheme=localStorage.getItem('harp_theme')||'light';
setTheme(savedTheme);
buildKeyBtns();
HMAP=buildMap(currentKey);
buildHarpVisual();
buildMetroBeats();
setupLongPress('bpmDown',function(){ bpmChange(-1); });
setupLongPress('bpmUp',function(){ bpmChange(1); });
applyTx();
render();
renderSess();
</script>
